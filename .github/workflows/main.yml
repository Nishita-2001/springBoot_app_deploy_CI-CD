name: Spring Boot CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Call Composite Action
        uses: springboot-composite-action/springboot-composite-action@v1

        with:
          ec2-host: ${{ secrets.EC2_HOST }}
          ec2-user: ec2-user

        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
